<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>.page { display: none; } .page.active { display: block; }</style>
</head>
<body class="bg-slate-50 p-4">
    <h1 class="text-xl font-bold text-center mb-6">Corduroy PPIC System</h1>
    
    <div class="flex justify-center gap-2 mb-6 text-[10px]">
        <button onclick="pindah('master')" class="bg-slate-700 text-white px-3 py-2 rounded">MASTER</button>
        <button onclick="pindah('input')" class="bg-slate-700 text-white px-3 py-2 rounded">INPUT WIP</button>
        <button onclick="pindah('stok')" class="bg-slate-700 text-white px-3 py-2 rounded">STOK</button>
    </div>

    <div id="master" class="page active max-w-lg mx-auto bg-white p-6 rounded-xl shadow border">
        <input id="m_cust" class="w-full border p-2 mb-2 rounded" placeholder="Customer">
        <input id="m_model" class="w-full border p-2 mb-2 rounded" placeholder="Model">
        <input id="m_item" class="w-full border p-2 mb-2 rounded" placeholder="Nama Item">
        <input id="m_proses" class="w-full border p-2 mb-4 rounded" placeholder="Proses (Potong,Jahit,QC)">
        <button onclick="simpanMaster()" class="w-full bg-blue-600 text-white p-2 rounded font-bold">SIMPAN MASTER</button>
    </div>

    <div id="input" class="page max-w-lg mx-auto bg-white p-6 rounded-xl shadow border">
        <select id="p_master_select" onchange="updateProses()" class="w-full border p-2 mb-2 rounded"></select>
        <select id="p_proses" class="w-full border p-2 mb-2 rounded"></select>
        <input id="p_qty" type="number" class="w-full border p-2 mb-4 rounded" placeholder="Jumlah">
        <button onclick="simpanWIP()" class="w-full bg-green-600 text-white p-2 rounded font-bold">INPUT PRODUKSI</button>
    </div>

    <div id="stok" class="page max-w-4xl mx-auto bg-white p-4 rounded-xl shadow border overflow-x-auto">
        <table class="w-full text-xs text-left">
            <thead class="bg-slate-800 text-white">
                <tr><th class="p-2">Detail</th><th class="p-2">Masuk</th><th class="p-2">Deliv</th><th class="p-2">Sisa</th></tr>
            </thead>
            <tbody id="tabel-body"></tbody>
        </table>
    </div>

    <<script>
        // Inisialisasi Aman
        if (typeof window.supabaseClient === 'undefined') {
            window.supabaseClient = supabase.createClient(
                'https://gbohivcpptvejvkehzun.supabase.co', 
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE'
            );
        }

        function pindah(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            if (target) target.classList.add('active');
            if (id === 'input') loadMasterOptions();
            if (id === 'stok') loadStok();
        }

        async function simpanMaster() {
            const cust = document.getElementById('m_cust');
            const model = document.getElementById('m_model');
            const item = document.getElementById('m_item');
            const proses = document.getElementById('m_proses');

            const { error } = await window.supabaseClient.from('master_items').insert([{
                customer: cust.value,
                model: model.value,
                item_name: item.value,
                proses: proses.value
            }]);
            
            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Master Tersimpan!");
                // Bersihkan kolom
                cust.value = ''; model.value = ''; item.value = ''; proses.value = '';
            }
        }

        async function loadMasterOptions() {
            const { data, error } = await window.supabaseClient.from('master_items').select('*');
            const select = document.getElementById('p_master_select');
            if (data) {
                select.innerHTML = '<option value="">-- Pilih Item --</option>' + 
                    data.map(i => `<option value='${JSON.stringify(i)}'>${i.item_name} (${i.model})</option>`).join('');
            }
        }

        function updateProses() {
            const val = document.getElementById('p_master_select').value;
            const selectProses = document.getElementById('p_proses');
            if (!val) { selectProses.innerHTML = ''; return; }
            
            const data = JSON.parse(val);
            selectProses.innerHTML = data.proses.split(',').map(p => `<option>${p.trim()}</option>`).join('');
        }

        async function simpanWIP() {
            const selectElement = document.getElementById('p_master_select');
            const qtyInput = document.getElementById('p_qty');
            
            if (!selectElement.value) return alert("Pilih Item dulu!");
            
            const item = JSON.parse(selectElement.value);
            const { error } = await window.supabaseClient.from('wip_logs').insert([{
                customer: item.customer, 
                model: item.model, 
                item_name: item.item_name,
                proses: document.getElementById('p_proses').value,
                jumlah: parseInt(qtyInput.value)
            }]);
            
            if (error) {
                alert("Gagal Input WIP: " + error.message);
            } else {
                alert("Produksi Terinput ke Log WIP!");
                qtyInput.value = ''; // Bersihkan jumlah
            }
        }

        async function loadStok() {
            const { data } = await window.supabaseClient.from('stok_data').select('*');
            const tbody = document.getElementById('tabel-body');
            if (data) {
                tbody.innerHTML = data.map(i => `
                    <tr>
                        <td class="p-2">${i.detail || '-'}</td>
                        <td class="p-2">${i.masuk || 0}</td>
                        <td class="p-2"><input type="number" class="w-16 border p-1" onchange="updateStok(${i.id}, 'delivery', this.value)" value="${i.delivery || 0}"></td>
                        <td class="p-2"><input type="number" class="w-16 border p-1" onchange="updateStok(${i.id}, 'sisa', this.value)" value="${i.sisa || 0}"></td>
                    </tr>
                `).join('');
            }
        }

        async function updateStok(id, field, val) {
            await window.supabaseClient.from('stok_data').update({[field]: parseInt(val)}).eq('id', id);
        }
    </script>
</body>
</html>
