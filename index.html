<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body class="p-4 bg-gray-100">
    <div class="flex gap-2 mb-4">
        <button onclick="showPage('master')" class="bg-blue-500 text-white p-2">Master</button>
        <button onclick="showPage('input')" class="bg-blue-500 text-white p-2">Input</button>
    </div>

    <div id="master" class="page active">
        <h1 class="font-bold">Halaman Master</h1>
        <p>Jika Anda bisa melihat ini, navigasi sudah jalan!</p>
    </div>

    <div id="input" class="page">
        <h1 class="font-bold">Halaman Input</h1>
        <p>Navigasi sukses!</p>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
