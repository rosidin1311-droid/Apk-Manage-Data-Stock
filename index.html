<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="p-4 bg-gray-100">
    <div class="flex gap-2 mb-6">
        <button onclick="showPage('master')" class="bg-blue-600 text-white p-2 rounded">Master</button>
        <button onclick="showPage('input')" class="bg-blue-600 text-white p-2 rounded">Input</button>
    </div>

    <div id="master" class="page active p-4 bg-white rounded shadow">
        <h2 class="font-bold">Halaman Master</h2>
        <input id="m_input" class="border p-2 w-full mt-2" placeholder="Nama Item">
        <button onclick="addMaster()" class="bg-green-600 text-white p-2 w-full mt-2">Simpan</button>
    </div>

    <div id="input" class="page p-4 bg-white rounded shadow">
        <h2 class="font-bold">Halaman Input</h2>
    </div>

    <script>
        // Inisialisasi Supabase - Cukup satu kali di sini saja
        const supabaseUrl = 'https://gbohivcpptvejvkehzun.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Fungsi Navigasi
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Fungsi Database
        async function addMaster() {
            const val = document.getElementById('m_input').value;
            if (!val) return alert("Isi dulu namanya!");
            
            const { error } = await supabase.from('items').insert([{ nama_item: val }]);
            alert(error ? "Error: " + error.message : "Berhasil disimpan!");
        }
    </script>
</body>
</html>
