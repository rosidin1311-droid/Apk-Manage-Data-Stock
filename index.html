<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corduroy Stock Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body class="bg-[#f8f1f1] text-[#5c4d4d] font-sans pb-10">

    <header class="bg-[#d8a7b1] p-6 text-white shadow-lg rounded-b-[2rem]">
        <h1 class="text-2xl font-bold">Corduroy Inventory</h1>
        <p class="text-sm opacity-90">Sistem Manajemen Produksi</p>
    </header>

    <nav class="flex justify-around p-4 gap-2">
        <button onclick="showPage('master')" class="bg-white px-4 py-2 rounded-xl shadow border border-pink-100 font-semibold text-xs">MASTER</button>
        <button onclick="showPage('input')" class="bg-white px-4 py-2 rounded-xl shadow border border-pink-100 font-semibold text-xs">INPUT</button>
        <button onclick="showPage('wip')" class="bg-white px-4 py-2 rounded-xl shadow border border-pink-100 font-semibold text-xs">WIP</button>
        <button onclick="showPage('stok')" class="bg-white px-4 py-2 rounded-xl shadow border border-pink-100 font-semibold text-xs">STOK</button>
    </nav>

    <main class="px-4">
        <div id="master" class="page active space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-pink-50">
                <h3 class="font-bold mb-3">Kelola Master</h3>
                <input id="m_input" class="w-full p-3 border border-pink-200 rounded-xl mb-2" placeholder="Nama Item/Customer/Proses">
                <button onclick="addMaster()" class="w-full bg-[#d8a7b1] text-white py-3 rounded-xl font-bold">SIMPAN MASTER</button>
            </div>
            <div id="list-master" class="text-sm"></div>
        </div>

        <div id="input" class="page space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-pink-50">
                <select id="p_item" class="w-full p-3 border border-pink-200 rounded-xl mb-2"></select>
                <input id="p_qty" type="number" class="w-full p-3 border border-pink-200 rounded-xl mb-2" placeholder="Jumlah">
                <button onclick="saveProduction()" class="w-full bg-[#d8a7b1] text-white py-3 rounded-xl font-bold">MULAI PRODUKSI</button>
            </div>
        </div>

        <div id="wip" class="page space-y-4">
            <button onclick="exportCSV('production_logs')" class="bg-emerald-500 text-white w-full py-2 rounded-lg text-sm">Download WIP (CSV)</button>
            <div id="list-wip" class="space-y-3"></div>
        </div>

        <div id="stok" class="page space-y-4">
            <div id="list-stok" class="space-y-3"></div>
            <hr>
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <input id="d_id" class="w-full p-2 border rounded-lg mb-2" placeholder="Nama Item">
                <input id="d_qty" type="number" class="w-full p-2 border rounded-lg mb-2" placeholder="Qty Delivery">
                <button onclick="prosesDelivery()" class="w-full bg-red-400 text-white py-2 rounded-lg font-bold">EXECUTE DELIVERY</button>
            </div>
        </div>
    </main>

    <script>
        // 1. Inisialisasi Supabase
        const supabaseUrl = 'https://dgtusdefxvvrrefkpfwp.supabase.co/rest/v1/

eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRndHVzZGVmeHZ2cnJlZmtwZndwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTY4NzUsImV4cCI6MjA5NTY3Mjg3NX0.wuiBY5UpyHJO_J9j1C6CHh5tcgg6xk6Z2BG6I3ppDog';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRndHVzZGVmeHZ2cnJlZmtwZndwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTY4NzUsImV4cCI6MjA5NTY3Mjg3NX0.wuiBY5UpyHJO_J9j1C6CHh5tcgg6xk6Z2BG6I3ppDog';
        const supabase = supabaseClient.createClient(supabaseUrl, supabaseKey);

        // 2. Navigasi Logic
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 3. Logic Data
        async function saveProduction() {
            try {
                const item = document.getElementById('p_item').value;
                const qty = document.getElementById('p_qty').value;
                const { error } = await supabase.from('production_logs').insert([{ item_id: item, quantity: qty, status: 'WIP' }]);
                if(error) throw error;
                alert("Data masuk WIP!");
                location.reload();
            } catch(e) { alert("Error: " + e.message); }
        }

        async function prosesDelivery() {
            const item = document.getElementById('d_id').value;
            const qty = parseInt(document.getElementById('d_qty').value);
            
            const { data: st } = await supabase.from('stock').select('total_qty').eq('item_id', item).single();
            if(st) {
                await supabase.from('stock').update({ total_qty: st.total_qty - qty }).eq('item_id', item);
                alert("Delivery berhasil!");
                location.reload();
            } else {
                alert("Item tidak ditemukan di stok!");
            }
        }

        // 4. Utility: Export CSV
        async function exportCSV(table) {
            const { data } = await supabase.from(table).select('*');
            let csv = "ID,Item,Qty\n";
            data.forEach(d => csv += `${d.id},${d.item_id},${d.quantity}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'data.csv'; a.click();
        }
    </script>
</body>
</html>
