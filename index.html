<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="p-4 bg-slate-50 font-sans">
    <h1 class="text-xl font-bold mb-4 text-center text-slate-800">Corduroy Inventory</h1>
    
    <nav class="flex justify-between gap-1 mb-6">
        <button onclick="showPage('master')" class="bg-slate-700 text-white p-2 rounded text-xs font-bold">MASTER</button>
        <button onclick="showPage('input')" class="bg-slate-700 text-white p-2 rounded text-xs font-bold">INPUT</button>
        <button onclick="showPage('wip')" class="bg-slate-700 text-white p-2 rounded text-xs font-bold" onclick="loadData()">WIP</button>
        <button onclick="showPage('stok')" class="bg-slate-700 text-white p-2 rounded text-xs font-bold" onclick="loadData()">STOK</button>
    </nav>

    <div id="stok" class="page p-4 bg-white rounded-xl shadow-sm border border-slate-200">
        <h2 class="font-bold mb-4 text-slate-700">Data Stok Terkini</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-100 text-slate-600 uppercase font-bold">
                    <tr>
                        <th class="p-3">Item</th>
                        <th class="p-3">Status</th>
                    </tr>
                </thead>
                <tbody id="tabel-stok" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://gbohivcpptvejvkehzun.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE';
        window.sb = window.sb || supabase.createClient(supabaseUrl, supabaseKey);

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stok') loadData(); // Auto-load data saat buka halaman stok
        }

        async function loadData() {
            const { data, error } = await window.sb.from('items').select('*');
            const tbody = document.getElementById('tabel-stok');
            tbody.innerHTML = ''; // Reset tabel
            
            if (data) {
                data.forEach(item => {
                    tbody.innerHTML += `<tr>
                        <td class="p-3">${item.nama_item}</td>
                        <td class="p-3 text-green-600 font-bold">Ready</td>
                    </tr>`;
                });
            }
        }
    </script>
</body>
</html>
