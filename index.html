<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corduroy Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="bg-[#f8f1f1] p-4">

    <div class="flex gap-2 mb-6">
        <button onclick="showPage('master')" class="bg-rose-300 p-2 rounded text-white">Master</button>
        <button onclick="showPage('input')" class="bg-rose-300 p-2 rounded text-white">Input</button>
        <button onclick="showPage('wip')" class="bg-rose-300 p-2 rounded text-white">WIP</button>
    </div>

    <div id="master" class="page active">
        <h2 class="font-bold">Master Item</h2>
        <input id="m_input" class="border p-2 w-full" placeholder="Nama Item Baru">
        <button onclick="addMaster()" class="bg-rose-400 text-white p-2 w-full mt-2">Tambah</button>
    </div>

    <div id="input" class="page">
        <h2 class="font-bold">Input Produksi</h2>
        </div>

    <div id="wip" class="page">
        <h2 class="font-bold">WIP Data</h2>
    </div>

    <script>
        // 1. Inisialisasi Supabase (Hanya sekali)
        const supabaseUrl = 'https://gbohivcpptvejvkehzun.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Navigasi
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 3. Fungsi Master
        async function addMaster() {
            const val = document.getElementById('m_input').value;
            const { error } = await supabase.from('items').insert([{ nama_item: val }]);
            alert(error ? "Gagal: " + error.message : "Berhasil!");
        }
    </script>
</body>
</html>
