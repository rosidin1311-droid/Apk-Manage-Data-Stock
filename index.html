<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Data Stok 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .page { display: none; } .page.active { display: block; }
        .sidebar { transform: translateX(-100%); transition: 0.3s; }
        .sidebar.open { transform: translateX(0); }
    </style>
</head>
<body class="bg-pink-50 font-sans">

    <div class="bg-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-pink-600 font-bold uppercase">Data Stok 2.0</h1>
        <button onclick="toggleSidebar()" class="text-pink-600 text-2xl">☰</button>
    </div>

    <div id="sidebar" class="sidebar fixed top-0 left-0 h-full w-64 bg-pink-600 z-50 p-5 text-white">
        <button onclick="toggleSidebar()" class="mb-5 text-xl">✕ Tutup</button>
        <nav class="flex flex-col gap-4">
            <button onclick="nav('master_list')">MASTER LIST</button>
            <button onclick="nav('add_master')">ADD MASTER</button>
            <button onclick="nav('input_wip')">INPUT WIP</button>
            <button onclick="nav('wip_report')">LAPORAN</button>
            <button onclick="nav('stok')">DATA STOK</button>
        </nav>
    </div>

    <div class="p-4">
        <div id="add_master" class="page max-w-sm mx-auto bg-white p-5 rounded-xl shadow">
            <h2 class="font-bold text-pink-600 mb-4">Tambah Master</h2>
            <input id="m_cust" class="w-full border p-2 mb-2 rounded" placeholder="Customer">
            <input id="m_model" class="w-full border p-2 mb-2 rounded" placeholder="Model">
            <input id="m_item" class="w-full border p-2 mb-2 rounded" placeholder="Item">
            <input id="m_proses" class="w-full border p-2 mb-4 rounded" placeholder="Proses (ex: Potong,Jahit)">
            <button onclick="simpanMaster()" class="w-full bg-pink-500 text-white p-3 rounded font-bold">SIMPAN</button>
        </div>

        <div id="master_list" class="page active text-center mt-10">Daftar Master...</div>
    </div>

<script>
    const sb = supabase.createClient('https://gbohivcpptvejvkehzun.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE');

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        toggleSidebar();
    }

    // Pastikan fungsi ini dipanggil dengan benar
    async function simpanMaster() {
        const cust = document.getElementById('m_cust').value;
        const model = document.getElementById('m_model').value;
        const item = document.getElementById('m_item').value;
        const proses = document.getElementById('m_proses').value;

        if(!cust || !item) return alert("Isi data dengan lengkap!");

        const { error } = await sb.from('master_items').insert([{
            customer: cust, model: model, item_name: item, proses: proses
        }]);
        
        if(error) alert("Gagal: " + error.message);
        else { alert("Berhasil!"); location.reload(); }
    }
</script>
</body>
</html>
