<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corduroy Stock Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .page { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body class="bg-[#f8f1f1] text-[#5c4d4d] font-sans pb-10">

    <header class="bg-[#d8a7b1] p-6 text-white shadow-lg rounded-b-[2rem]">
        <h1 class="text-2xl font-bold">Corduroy Inventory</h1>
    </header>

    <nav class="flex justify-around p-4 gap-2">
        <button onclick="showPage('master')" class="bg-white px-4 py-2 rounded-xl shadow border border-pink-100 font-semibold text-xs">MASTER</button>
        <button onclick="showPage('input')" class="bg-white px-4 py-2 rounded-xl shadow border border-pink-100 font-semibold text-xs">INPUT</button>
        <button onclick="showPage('wip')" class="bg-white px-4 py-2 rounded-xl shadow border border-pink-100 font-semibold text-xs">WIP</button>
        <button onclick="showPage('stok')" class="bg-white px-4 py-2 rounded-xl shadow border border-pink-100 font-semibold text-xs">STOK</button>
    </nav>

    <main class="px-4">
        <div id="master" class="page active">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-pink-50">
                <h3 class="font-bold mb-3">Kelola Master</h3>
                <input id="m_input" class="w-full p-3 border border-pink-200 rounded-xl mb-2" placeholder="Nama Item">
                <button onclick="addMaster()" class="w-full bg-[#d8a7b1] text-white py-3 rounded-xl font-bold">SIMPAN MASTER</button>
            </div>
        </div>
        <div id="input" class="page">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-pink-50">
                <input id="p_item" class="w-full p-3 border border-pink-200 rounded-xl mb-2" placeholder="Nama Item">
                <input id="p_qty" type="number" class="w-full p-3 border border-pink-200 rounded-xl mb-2" placeholder="Jumlah">
                <button onclick="saveProduction()" class="w-full bg-[#d8a7b1] text-white py-3 rounded-xl font-bold">MULAI PRODUKSI</button>
            </div>
        </div>
        <div id="wip" class="page"><h3 class="p-5">Halaman WIP</h3></div>
        <div id="stok" class="page"><h3 class="p-5">Halaman Stok</h3></div>
    </main>

    <script>
        // Inisialisasi Supabase - Cukup sekali saja
        const supabaseUrl = 'https://gbohivcpptvejvkehzun.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function addMaster() {
            const val = document.getElementById('m_input').value;
            const { error } = await supabase.from('items').insert([{ nama_item: val }]);
            alert(error ? "Error: " + error.message : "Berhasil disimpan!");
        }

        async function saveProduction() {
            const item = document.getElementById('p_item').value;
            const qty = document.getElementById('p_qty').value;
            const { error } = await supabase.from('production_logs').insert([{ item_id: item, quantity: qty, status: 'WIP' }]);
            alert(error ? "Error: " + error.message : "Produksi dimulai!");
        }
    </script>
</body>
</html>
