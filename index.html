<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>.page { display: none; } .page.active { display: block; }</style>
</head>
<body class="bg-slate-50 p-4">
    <h1 class="text-xl font-bold text-center mb-6">Corduroy PPIC System</h1>
    
    <div class="flex justify-center gap-1 mb-6 text-[9px] flex-wrap">
        <button onclick="pindah('master_list')" class="bg-slate-700 text-white px-2 py-1 rounded">MASTER LIST</button>
        <button onclick="pindah('master')" class="bg-slate-700 text-white px-2 py-1 rounded">ADD MASTER</button>
        <button onclick="pindah('input')" class="bg-slate-700 text-white px-2 py-1 rounded">INPUT WIP</button>
        <button onclick="pindah('wip_report')" class="bg-slate-700 text-white px-2 py-1 rounded">LAPORAN WIP</button>
        <button onclick="pindah('stok')" class="bg-slate-700 text-white px-2 py-1 rounded">DATA STOK</button>
    </div>

    <div id="master" class="page max-w-lg mx-auto bg-white p-6 rounded-xl shadow border">
        <input id="m_cust" class="w-full border p-2 mb-2 rounded" placeholder="Customer">
        <input id="m_model" class="w-full border p-2 mb-2 rounded" placeholder="Model">
        <input id="m_item" class="w-full border p-2 mb-2 rounded" placeholder="Nama Item">
        <input id="m_proses" class="w-full border p-2 mb-4 rounded" placeholder="Proses (Contoh: Potong,Jahit,QC)">
        <button onclick="simpanMaster()" class="w-full bg-blue-600 text-white p-2 rounded font-bold">SIMPAN MASTER</button>
    </div>

    <div id="master_list" class="page max-w-4xl mx-auto bg-white p-6 rounded-xl shadow border">
        <h2 class="font-bold mb-4">Daftar Master Item</h2>
        <table class="w-full text-xs text-left"><thead class="bg-slate-800 text-white"><tr><th class="p-2">Customer</th><th class="p-2">Model</th><th class="p-2">Item</th><th class="p-2">Proses</th><th class="p-2">Aksi</th></tr></thead><tbody id="master-tabel-body"></tbody></table>
    </div>

    <div id="input" class="page max-w-lg mx-auto bg-white p-6 rounded-xl shadow border">
        <select id="p_master_select" onchange="updateProses()" class="w-full border p-2 mb-2 rounded"></select>
        <select id="p_proses" class="w-full border p-2 mb-2 rounded"></select>
        <input id="p_qty" type="number" class="w-full border p-2 mb-4 rounded" placeholder="Jumlah">
        <button onclick="simpanWIP()" class="w-full bg-green-600 text-white p-2 rounded font-bold">INPUT PRODUKSI</button>
    </div>

    <div id="wip_report" class="page max-w-4xl mx-auto bg-white p-6 rounded-xl shadow border">
        <h2 class="font-bold mb-4">Laporan WIP</h2>
        <table class="w-full text-xs text-left"><thead class="bg-slate-800 text-white"><tr><th class="p-2">Tgl</th><th class="p-2">Item</th><th class="p-2">Proses</th><th class="p-2">Jml</th><th class="p-2">Aksi</th></tr></thead><tbody id="wip-tabel-body"></tbody></table>
    </div>

    <div id="stok" class="page max-w-4xl mx-auto bg-white p-4 rounded-xl shadow border overflow-x-auto">
        <table class="w-full text-xs text-left"><thead class="bg-slate-800 text-white"><tr><th class="p-2">Detail</th><th class="p-2">Masuk</th><th class="p-2">Deliv</th><th class="p-2">Sisa</th></tr></thead><tbody id="tabel-body"></tbody></table>
    </div>

    <script>
        const sb = supabase.createClient('https://gbohivcpptvejvkehzun.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE');

        function pindah(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            if(id === 'master_list') loadMasterList();
            if(id === 'input') loadMasterOptions();
            if(id === 'wip_report') loadWipReport();
            if(id === 'stok') loadStok();
        }

        async function simpanMaster() {
            const { error } = await sb.from('master_items').insert([{
                customer: document.getElementById('m_cust').value,
                model: document.getElementById('m_model').value,
                item_name: document.getElementById('m_item').value,
                proses: document.getElementById('m_proses').value
            }]);
            if(error) alert("Error: " + error.message);
            else { alert("Master Tersimpan!"); location.reload(); }
        }

        async function loadMasterList() {
            const { data } = await sb.from('master_items').select('*');
            document.getElementById('master-tabel-body').innerHTML = (data||[]).map(i => `<tr><td class="p-2">${i.customer}</td><td class="p-2">${i.model}</td><td class="p-2">${i.item_name}</td><td class="p-2">${i.proses}</td><td class="p-2"><button onclick="hapusMaster(${i.id})" class="bg-red-500 text-white px-2 py-1 rounded">Hapus</button></td></tr>`).join('');
        }

        async function hapusMaster(id) {
            if(!confirm("Hapus master ini?")) return;
            await sb.from('master_items').delete().eq('id', id); loadMasterList();
        }

        async function loadMasterOptions() {
            const { data } = await sb.from('master_items').select('*');
            const select = document.getElementById('p_master_select');
            if(data) select.innerHTML = '<option value="">-- Pilih Item --</option>' + data.map(i => `<option value='${JSON.stringify(i)}'>${i.item_name} (${i.model})</option>`).join('');
        }

        function updateProses() {
            const val = document.getElementById('p_master_select').value;
            const selectProses = document.getElementById('p_proses');
            if(!val) { selectProses.innerHTML = ''; return; }
            const data = JSON.parse(val);
            selectProses.innerHTML = data.proses.split(',').map(p => `<option>${p.trim()}</option>`).join('');
        }

        async function simpanWIP() {
            const val = document.getElementById('p_master_select').value;
            if(!val) return alert("Pilih item!");
            const item = JSON.parse(val);
            const { error } = await sb.from('wip_logs').insert([{
                customer: item.customer, model: item.model, item_name: item.item_name,
                proses: document.getElementById('p_proses').value,
                jumlah: parseInt(document.getElementById('p_qty').value || 0),
                is_done: false
            }]);
            if(error) alert("Error: " + error.message); else { alert("Produksi Terinput!"); loadWipReport(); }
        }

        async function loadWipReport() {
            const { data: masters } = await sb.from('master_items').select('*');
            const { data: wips } = await sb.from('wip_logs').select('*').eq('is_done', false);
            const tbody = document.getElementById('wip-tabel-body');
            if(wips) {
                tbody.innerHTML = wips.map(i => {
                    const master = masters.find(m => m.item_name === i.item_name && m.model === i.model);
                    const isFinal = (i.proses === (master?.proses.split(',').pop()?.trim()));
                    const tgl = i.created_at ? new Date(i.created_at).toLocaleDateString() : '-';
                    return `<tr><td class="p-2">${tgl}</td><td class="p-2">${i.customer}/${i.model}/${i.item_name}</td><td class="p-2">${i.proses}</td><td class="p-2">${i.jumlah}</td><td class="p-2">${isFinal ? `<button onclick="selesaikanWIP(${i.id}, '${i.customer}|${i.model}|${i.item_name}', ${i.jumlah})" class="bg-green-600 text-white px-2 py-1 rounded text-[9px]">FINISH</button>` : `<button onclick="lanjutProses(${i.id}, '${i.item_name}', '${i.customer}', '${i.model}', ${i.jumlah}, '${master?.proses || ''}')" class="bg-blue-500 text-white px-2 py-1 rounded text-[9px]">SPLIT & NEXT</button>`}</td></tr>`;
                }).join('');
            }
        }

        async function lanjutProses(id, itemName, customer, model, sisaWip, daftarProses) {
            const jumlahLanjut = prompt(`Total WIP: ${sisaWip}. Jumlah lanjut?`);
            const qty = parseInt(jumlahLanjut);
            if (isNaN(qty) || qty <= 0 || qty > sisaWip) return alert("Jumlah invalid!");
            const prosesBaru = prompt("Pilih proses:\n" + daftarProses);
            if (!prosesBaru || !daftarProses.includes(prosesBaru.trim())) return alert("Proses tidak valid!");
            await sb.from('wip_logs').insert([{ customer, model, item_name: itemName, proses: prosesBaru.trim(), jumlah: qty, is_done: false }]);
            await sb.from('wip_logs').update({ jumlah: sisaWip - qty }).eq('id', id);
            loadWipReport();
        }

        async function selesaikanWIP(id, detail, qty) {
            if(!confirm("Pindahkan ke Data Stok?")) return;
            await sb.from('stok_data').insert([{ detail, masuk: qty, sisa: qty }]);
            await sb.from('wip_logs').update({ is_done: true }).eq('id', id);
            loadWipReport();
        }

        async function loadStok() {
            const { data } = await sb.from('stok_data').select('*');
            document.getElementById('tabel-body').innerHTML = (data || []).map(i => `<tr><td class="p-2">${i.detail || '-'}</td><td class="p-2">${i.masuk || 0}</td><td class="p-2"><input type="number" id="deliv_${i.id}" class="w-12 border p-1" value="${i.delivery||0}"> <button onclick="updateStok(${i.id},${i.masuk},document.getElementById('deliv_${i.id}').value)" class="bg-blue-600 text-white px-1 rounded">OK</button></td><td class="p-2">${i.sisa || 0}</td></tr>`).join('');
        }

        async function updateStok(id, masuk, val) {
            const deliv = parseInt(val||0); const sisa = masuk - deliv;
            if(sisa < 0) return alert("Error: Deliv > Masuk!");
            await sb.from('stok_data').update({ delivery: deliv, sisa: sisa }).eq('id', id);
            alert("Stok diupdate!"); loadStok();
        }
    </script>
</body>
</html>
