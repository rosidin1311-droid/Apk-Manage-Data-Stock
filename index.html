<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Data Stok 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Montserrat', sans-serif; }
        .page { display: none; } .page.active { display: block; }
        .btn-nav.active { background: #db2777; color: white; }
    </style>
</head>
<body class="bg-pink-50 p-2">

    <h1 class="text-lg font-bold mb-4 text-pink-600 text-center uppercase">Aplikasi Data Stok 2.0</h1>

    <div class="flex gap-1 mb-4 overflow-x-auto pb-2 justify-center">
        <button onclick="pindah('master_list', this)" class="btn-nav active px-3 py-2 rounded-lg bg-white border border-pink-200 text-xs">MASTER</button>
        <button onclick="pindah('input', this)" class="btn-nav px-3 py-2 rounded-lg bg-white border border-pink-200 text-xs">INPUT</button>
        <button onclick="pindah('wip_report', this)" class="btn-nav px-3 py-2 rounded-lg bg-white border border-pink-200 text-xs">LAPORAN</button>
        <button onclick="pindah('stok', this)" class="btn-nav px-3 py-2 rounded-lg bg-white border border-pink-200 text-xs">STOK</button>
    </div>

    <!-- Halaman Laporan WIP -->
    <div id="wip_report" class="page active max-w-lg mx-auto bg-white p-3 rounded-xl shadow">
        <h2 class="font-bold text-pink-600 mb-2 text-sm">📊 Laporan WIP</h2>
        <div class="flex gap-1 mb-3">
            <select id="filter_cust" onchange="loadWipReport()" class="border p-2 rounded text-xs w-full"></select>
            <button onclick="exportExcel('wip-table')" class="bg-green-600 text-white px-3 py-1 rounded text-xs">Excel</button>
        </div>
        <div class="overflow-x-auto">
            <table id="wip-table" class="w-full text-[10px] border">
                <thead class="bg-pink-100"><tr><th>Item</th><th>Prs</th><th>Jml</th><th>NG</th><th>Aksi</th></tr></thead>
                <tbody id="wip-tabel-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Koreksi -->
    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-5 rounded-lg w-full max-w-sm">
            <h3 class="font-bold mb-3">Koreksi Data</h3>
            <input type="hidden" id="edit_id">
            <label class="text-xs">Jumlah</label>
            <input id="edit_jml" type="number" class="w-full border p-2 mb-2 rounded">
            <label class="text-xs">NG (Reject)</label>
            <input id="edit_ng" type="number" class="w-full border p-2 mb-4 rounded">
            <div class="flex gap-2">
                <button onclick="saveKoreksi()" class="bg-pink-500 text-white p-2 rounded w-full">SIMPAN</button>
                <button onclick="closeModal()" class="bg-gray-300 p-2 rounded w-full">BATAL</button>
            </div>
        </div>
    </div>

<script>
    const sb = supabase.createClient('https://gbohivcpptvejvkehzun.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE');

    // Load Filter Customer
    async function init() {
        const { data } = await sb.from('master_items').select('customer');
        const custs = [...new Set(data.map(i => i.customer))];
        const sel = document.getElementById('filter_cust');
        sel.innerHTML = '<option value="">Semua Cust</option>' + custs.map(c => `<option value="${c}">${c}</option>`).join('');
        loadWipReport();
    }

    async function loadWipReport() {
        const { data: m } = await sb.from('master_items').select('*');
        const { data: w } = await sb.from('wip_logs').select('*');
        const filter = document.getElementById('filter_cust').value;
        
        const tbody = document.getElementById('wip-tabel-body');
        tbody.innerHTML = (w||[]).filter(i => !i.is_done && (!filter || i.customer === filter)).map(i => {
            const master = m.find(ma => ma.item_name === i.item_name);
            const isFinal = (i.proses === master?.proses.split(',').pop()?.trim());
            return `<tr>
                <td class="p-1">${i.item_name}</td>
                <td class="p-1">${i.proses}</td>
                <td class="p-1">${i.jumlah}</td>
                <td class="p-1">${i.ng || 0}</td>
                <td class="p-1">
                    <button onclick="openModal(${i.id}, ${i.jumlah}, ${i.ng||0})" class="text-blue-500">Edit</button>
                    ${isFinal ? `<button onclick="selesaikan(${i.id}, '${i.customer}|${i.model}|${i.item_name}', ${i.jumlah})" class="text-green-500 ml-1">Fin</button>` : ''}
                </td>
            </tr>`;
        }).join('');
    }

    function openModal(id, jml, ng) {
        document.getElementById('edit_id').value = id;
        document.getElementById('edit_jml').value = jml;
        document.getElementById('edit_ng').value = ng;
        document.getElementById('editModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('editModal').classList.add('hidden'); }

    async function saveKoreksi() {
        const id = document.getElementById('edit_id').value;
        await sb.from('wip_logs').update({ jumlah: parseInt(document.getElementById('edit_jml').value), ng: parseInt(document.getElementById('edit_ng').value) }).eq('id', id);
        closeModal();
        loadWipReport();
    }

    async function selesaikan(id, detail, qty) {
        await sb.from('stok_data').insert([{ detail, masuk: qty, sisa: qty }]);
        await sb.from('wip_logs').update({ is_done: true }).eq('id', id);
        loadWipReport();
    }

    function exportExcel(id) {
        XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById(id)), "Laporan.xlsx");
    }

    function pindah(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
    }

    init();
</script>
</body>
</html>
