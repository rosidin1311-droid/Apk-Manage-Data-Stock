<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="p-4 bg-gray-100">
    <div class="flex gap-2 mb-4">
        <button onclick="showPage('master')" class="bg-blue-500 text-white p-2 rounded">Master</button>
        <button onclick="showPage('input')" class="bg-blue-500 text-white p-2 rounded">Input</button>
    </div>

    <div id="master" class="page active p-4 bg-white rounded shadow">
        <h1 class="font-bold">Halaman Master</h1>
        <input id="m_input" class="border p-2 w-full mt-2" placeholder="Nama Item">
        <button onclick="prosesMaster()" class="bg-green-500 text-white p-2 w-full mt-2">Simpan</button>
    </div>

    <div id="input" class="page p-4 bg-white rounded shadow">
        <h1 class="font-bold">Halaman Input</h1>
    </div>

    <script>
        // 1. Inisialisasi Aman
        const supabaseUrl = 'https://gbohivcpptvejvkehzun.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE';
        
        // Cek apakah supabase sudah ada untuk menghindari error "already declared"
        window.sb = window.sb || supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Fungsi Navigasi
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
        }

        // 3. Fungsi Database
        async function prosesMaster() {
            const val = document.getElementById('m_input').value;
            if(!val) return alert("Masukkan nama!");
            
            try {
                const { error } = await window.sb.from('items').insert([{ nama_item: val }]);
                if(error) throw error;
                alert("Berhasil disimpan!");
            } catch (err) {
                alert("Error: " + err.message);
            }
        }
    </script>
</body>
</html>
