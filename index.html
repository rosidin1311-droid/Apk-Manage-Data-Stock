<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Data Stok 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .page { display: none; } .page.active { display: block; }
        .sidebar { transform: translateX(-100%); transition: 0.3s; }
        .sidebar.open { transform: translateX(0); }
        .menu-card { @apply bg-white border border-pink-200 p-4 mb-3 rounded-lg shadow-sm flex items-center gap-4 text-pink-700 font-bold uppercase hover:bg-pink-100 transition-all; }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-pink-50 font-sans pb-10">

    <div class="bg-white p-4 flex justify-between items-center shadow-lg sticky top-0 z-40">
        <h1 class="text-pink-600 font-bold text-lg uppercase">Data Stok 2.0</h1>
        <button onclick="toggleSidebar()" class="text-pink-600 text-2xl"><i class="fa fa-bars"></i></button>
    </div>

    <div id="sidebar" class="sidebar fixed top-0 left-0 h-full w-72 bg-pink-100 z-50 p-5 shadow-2xl">
        <div class="flex justify-between mb-6 text-pink-600">
            <h2 class="font-bold">NAVIGASI</h2>
            <button onclick="toggleSidebar()"><i class="fa fa-times text-2xl"></i></button>
        </div>
        <button onclick="nav('master_list', loadMasterList)" class="menu-card w-full"><i class="fa fa-list"></i> MASTER LIST</button>
        <button onclick="nav('add_master')" class="menu-card w-full"><i class="fa fa-plus"></i> ADD MASTER</button>
        <button onclick="nav('input_wip', loadMasterOptions)" class="menu-card w-full"><i class="fa fa-edit"></i> INPUT WIP</button>
        <button onclick="nav('wip_report', loadWipReport)" class="menu-card w-full"><i class="fa fa-chart-line"></i> LAPORAN</button>
        <button onclick="nav('stok', loadStok)" class="menu-card w-full"><i class="fa fa-box"></i> DATA STOK</button>
    </div>

    <div class="p-4 max-w-lg mx-auto">
        <div id="master_list" class="page active bg-white p-5 rounded-xl shadow"><h2 class="font-bold text-pink-600 mb-4">📋 Daftar Master</h2><div class="table-scroll"><table class="w-full text-xs"><thead><tr class="bg-pink-100"><th>Cust</th><th>Model</th><th>Item</th></tr></thead><tbody id="master-tabel-body"></tbody></table></div></div>
        
        <div id="add_master" class="page bg-white p-5 rounded-xl shadow"><h2 class="font-bold text-pink-600 mb-4">✨ Tambah Master</h2><input id="m_cust" class="w-full border p-2 mb-2 rounded" placeholder="Customer"><input id="m_model" class="w-full border p-2 mb-2 rounded" placeholder="Model"><input id="m_item" class="w-full border p-2 mb-2 rounded" placeholder="Item"><input id="m_proses" class="w-full border p-2 mb-4 rounded" placeholder="Proses (ex: Potong,Jahit)"><button onclick="simpanMaster()" class="w-full bg-pink-500 text-white p-2 rounded">SIMPAN</button></div>

        <div id="input_wip" class="page bg-white p-5 rounded-xl shadow"><h2 class="font-bold text-pink-600 mb-4">📝 Input WIP</h2><select id="p_master_select" onchange="updateProses()" class="w-full border p-2 mb-2 rounded"></select><select id="p_proses" class="w-full border p-2 mb-2 rounded"></select><input id="p_qty" type="number" class="w-full border p-2 mb-4 rounded" placeholder="Jumlah"><button onclick="simpanWIP()" class="w-full bg-pink-500 text-white p-2 rounded">INPUT</button></div>

        <div id="wip_report" class="page bg-white p-5 rounded-xl shadow"><h2 class="font-bold text-pink-600 mb-4">📊 Laporan WIP</h2><div class="flex gap-2 mb-3"><select id="filter_cust" onchange="loadWipReport()" class="border p-2 rounded text-xs w-full"></select><button onclick="exportExcel('wip-table')" class="bg-green-600 text-white px-3 py-1 rounded text-xs">Excel</button></div><div class="table-scroll"><table id="wip-table" class="w-full text-[10px]"><thead><tr class="bg-pink-100"><th>Item</th><th>Prs</th><th>Jml</th><th>NG</th><th>Aksi</th></tr></thead><tbody id="wip-tabel-body"></tbody></table></div></div>

        <div id="stok" class="page bg-white p-5 rounded-xl shadow"><h2 class="font-bold text-pink-600 mb-4">📦 Data Stok</h2><div class="table-scroll"><table class="w-full text-xs"><thead><tr class="bg-pink-100"><th>Detail</th><th>Masuk</th><th>Sisa</th></tr></thead><tbody id="stok-tabel-body"></tbody></table></div></div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-5 rounded-lg w-full max-w-sm">
            <h3 class="font-bold mb-3">Koreksi Data</h3>
            <input type="hidden" id="edit_id"><label class="text-xs">Jumlah</label><input id="edit_jml" type="number" class="w-full border p-2 mb-2 rounded"><label class="text-xs">NG</label><input id="edit_ng" type="number" class="w-full border p-2 mb-4 rounded"><button onclick="saveKoreksi()" class="w-full bg-pink-500 text-white p-2 rounded mb-2">SIMPAN</button><button onclick="closeModal()" class="w-full bg-gray-300 p-2 rounded">BATAL</button>
        </div>
    </div>

</body>
</html>
