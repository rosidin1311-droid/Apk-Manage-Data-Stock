<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corduroy PPIC System - Montserrat Pink Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Montserrat', sans-serif; }
        body { background: #fdf2f8; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .page { display: none; } .page.active { display: block; }
        .slide-container { width: 100%; max-width: 1100px; background: #ffffff; border-radius: 24px; box-shadow: 0 10px 25px rgba(244, 114, 182, 0.1); padding: 40px; }
        .btn-nav { background: #fdf2f8; color: #db2777; padding: 10px 20px; border-radius: 12px; font-weight: 600; font-size: 13px; border: 1px solid #fbcfe8; transition: 0.3s; }
        .btn-nav.active { background: #db2777; color: #ffffff; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fce7f3; color: #9d174d; padding: 15px; text-align: left; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #fdf2f8; font-size: 13px; }
    </style>
</head>
<body>

    <h1 class="text-2xl font-bold mb-6 text-pink-600"><i class="fa-solid fa-layer-group"></i> CORDUROY PPIC SYSTEM</h1>

    <div class="flex gap-2 mb-8 flex-wrap justify-center">
        <button onclick="pindah('master_list', this)" class="btn-nav active">MASTER LIST</button>
        <button onclick="pindah('master', this)" class="btn-nav">ADD MASTER</button>
        <button onclick="pindah('input', this)" class="btn-nav">INPUT WIP</button>
        <button onclick="pindah('wip_report', this)" class="btn-nav">LAPORAN WIP</button>
        <button onclick="pindah('stok', this)" class="btn-nav">DATA STOK</button>
    </div>

    <div id="master" class="page slide-container">
        <h2 class="text-pink-600 font-bold mb-4">✨ Tambah Master Item</h2>
        <input id="m_cust" class="w-full border-2 p-3 mb-2 rounded-xl" placeholder="Customer">
        <input id="m_model" class="w-full border-2 p-3 mb-2 rounded-xl" placeholder="Model">
        <input id="m_item" class="w-full border-2 p-3 mb-2 rounded-xl" placeholder="Nama Item">
        <input id="m_proses" class="w-full border-2 p-3 mb-4 rounded-xl" placeholder="Proses (ex: Potong,Jahit,QC)">
        <button onclick="simpanMaster()" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold">SIMPAN MASTER</button>
    </div>

    <div id="master_list" class="page slide-container active">
        <h2 class="text-pink-600 font-bold mb-4">📋 Daftar Master Item</h2>
        <table><thead><tr><th>Customer</th><th>Model</th><th>Item</th><th>Proses</th><th>Aksi</th></tr></thead><tbody id="master-tabel-body"></tbody></table>
    </div>

    <div id="input" class="page slide-container">
        <h2 class="text-pink-600 font-bold mb-4">📝 Input Produksi WIP</h2>
        <select id="p_master_select" onchange="updateProses()" class="w-full border-2 p-3 mb-2 rounded-xl"></select>
        <select id="p_proses" class="w-full border-2 p-3 mb-2 rounded-xl"></select>
        <input id="p_qty" type="number" class="w-full border-2 p-3 mb-4 rounded-xl" placeholder="Jumlah">
        <button onclick="simpanWIP()" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold">INPUT PRODUKSI</button>
    </div>

    <div id="wip_report" class="page slide-container">
        <h2 class="text-pink-600 font-bold mb-4">📊 Laporan Kerja WIP</h2>
        <table><thead><tr><th>Tgl</th><th>Item/Model</th><th>Proses</th><th>Jml</th><th>Aksi</th></tr></thead><tbody id="wip-tabel-body"></tbody></table>
    </div>

    <div id="stok" class="page slide-container">
        <h2 class="text-pink-600 font-bold mb-4">📦 Gudang Barang Jadi</h2>
        <table><thead><tr><th>Detail</th><th>Masuk</th><th>Delivery</th><th>Sisa</th><th>Hapus</th></tr></thead><tbody id="tabel-body"></tbody></table>
    </div>

    
<script>
    const sb = supabase.createClient('https://gbohivcpptvejvkehzun.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE');

    // Navigasi Pindah Halaman
    function pindah(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
        
        // Panggil fungsi data setiap pindah halaman
        if(id === 'master_list') loadMasterList();
        if(id === 'input') loadMasterOptions();
        if(id === 'wip_report') loadWipReport();
        if(id === 'stok') loadStok();
    }

    // --- MASTER LOGIC ---
    async function simpanMaster() {
        const { error } = await sb.from('master_items').insert([{
            customer: document.getElementById('m_cust').value,
            model: document.getElementById('m_model').value,
            item_name: document.getElementById('m_item').value,
            proses: document.getElementById('m_proses').value
        }]);
        if(error) alert(error.message); else { alert("Master Tersimpan!"); location.reload(); }
    }

    async function loadMasterList() {
        const { data } = await sb.from('master_items').select('*');
        const body = document.getElementById('master-tabel-body');
        if(body) body.innerHTML = (data||[]).map(i => `<tr><td>${i.customer}</td><td>${i.model}</td><td>${i.item_name}</td><td>${i.proses}</td><td><button onclick="hapusMaster(${i.id})" class="text-rose-500"><i class="fa fa-trash"></i></button></td></tr>`).join('');
    }

    async function hapusMaster(id) {
        if(confirm("Hapus item?")) { await sb.from('master_items').delete().eq('id', id); loadMasterList(); }
    }

    // --- INPUT WIP LOGIC ---
    async function loadMasterOptions() {
        const { data } = await sb.from('master_items').select('*');
        const select = document.getElementById('p_master_select');
        if(!select) return;
        select.innerHTML = '<option value="">-- Pilih Item --</option>';
        if(data) data.forEach(i => {
            const opt = document.createElement('option');
            opt.value = JSON.stringify(i);
            opt.textContent = i.item_name + ' (' + i.model + ')';
            select.appendChild(opt);
        });
    }

    function updateProses() {
        const sel = document.getElementById('p_master_select');
        const target = document.getElementById('p_proses');
        if(!sel.value) return;
        const val = JSON.parse(sel.value);
        target.innerHTML = val.proses.split(',').map(p => `<option>${p.trim()}</option>`).join('');
    }

    async function simpanWIP() {
        const sel = document.getElementById('p_master_select');
        if(!sel.value) return alert("Pilih item!");
        const item = JSON.parse(sel.value);
        const { error } = await sb.from('wip_logs').insert([{ 
            customer: item.customer, 
            model: item.model, 
            item_name: item.item_name, 
            proses: document.getElementById('p_proses').value, 
            jumlah: parseInt(document.getElementById('p_qty').value || 0), 
            is_done: false,
            created_at: new Date().toISOString()
        }]);
        if(error) alert("Error: " + error.message); else { alert("Input Berhasil!"); loadWipReport(); }
    }

    // --- LAPORAN WIP & STOK ---
    async function loadWipReport() {
        const { data: m } = await sb.from('master_items').select('*');
        const { data: w } = await sb.from('wip_logs').select('*');
        const tbody = document.getElementById('wip-tabel-body');
        if(!tbody) return;
        
        tbody.innerHTML = (w||[]).filter(i => !i.is_done).map(i => {
            const master = m.find(ma => ma.item_name === i.item_name);
            const isFinal = (i.proses === master?.proses.split(',').pop()?.trim());
            const tgl = new Date().toLocaleDateString('id-ID'); '-';
            return `<tr>
                <td>${tgl}</td>
                <td>${i.customer}/${i.model}/${i.item_name}</td>
                <td>${i.proses}</td>
                <td>${i.jumlah}</td>
                <td>
                    ${isFinal ? 
                        `<button onclick="selesaikanWIP(${i.id}, '${i.customer}|${i.model}|${i.item_name}', ${i.jumlah})" class="bg-emerald-500 text-white px-2 py-1 rounded text-[10px]">FINISH</button>` : 
                        `<button onclick="lanjutProses(${i.id}, '${i.item_name}', '${i.customer}', '${i.model}', ${i.jumlah}, '${master?.proses || ''}')" class="bg-sky-500 text-white px-2 py-1 rounded text-[10px]">SPLIT</button>`
                    }
                    <button onclick="hapusWIP(${i.id})" class="text-rose-500 ml-2"><i class="fa fa-trash"></i></button>
                </td>
            </tr>`;
        }).join('');
    }

    async function hapusWIP(id) {
        if(confirm("Hapus data WIP ini?")) { await sb.from('wip_logs').delete().eq('id', id); loadWipReport(); }
    }

    async function lanjutProses(id, name, cust, mod, sisa, proses) {
        const qty = parseInt(prompt("Total " + sisa + ". Jumlah lanjut?"));
        if(qty > 0 && qty <= sisa) {
            const p = prompt("Pilih proses:\n" + proses);
            if(!p) return;
            await sb.from('wip_logs').insert([{ customer: cust, model: mod, item_name: name, proses: p, jumlah: qty, is_done: false, created_at: new Date().toISOString() }]);
            await sb.from('wip_logs').update({ jumlah: sisa - qty }).eq('id', id);
            loadWipReport();
        }
    }

    async function selesaikanWIP(id, detail, qty) {
        await sb.from('stok_data').insert([{ detail, masuk: qty, sisa: qty }]);
        await sb.from('wip_logs').update({ is_done: true }).eq('id', id);
        loadWipReport();
    }

    async function loadStok() {
        const { data } = await sb.from('stok_data').select('*');
        const body = document.getElementById('tabel-body');
        if(body) body.innerHTML = (data||[]).map(i => `<tr><td>${i.detail}</td><td>${i.masuk}</td><td><input type="number" id="d_${i.id}" value="${i.delivery||0}" class="w-12 border p-1 text-[10px]"> <button onclick="updateStok(${i.id}, ${i.masuk}, document.getElementById('d_${i.id}').value)" class="bg-pink-400 text-white p-1 rounded">OK</button></td><td>${i.sisa}</td><td><button onclick="hapusStok(${i.id})" class="text-rose-500"><i class="fa fa-trash"></i></button></td></tr>`).join('');
    }

    async function updateStok(id, masuk, val) {
        const deliv = parseInt(val||0);
        await sb.from('stok_data').update({ delivery: deliv, sisa: masuk - deliv }).eq('id', id);
        loadStok();
    }

    async function hapusStok(id) {
        if(confirm("Hapus stok?")) { await sb.from('stok_data').delete().eq('id', id); loadStok(); }
    }
</script>
