<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 font-sans p-4">
    <h1 class="text-xl font-bold text-slate-800 text-center mb-6">Corduroy Inventory</h1>
    
    <nav class="flex justify-between gap-1 mb-6">
        <button id="nav-master" class="bg-slate-700 text-white px-4 py-2 rounded-lg font-bold text-[10px]">MASTER</button>
        <button id="nav-input" class="bg-slate-700 text-white px-4 py-2 rounded-lg font-bold text-[10px]">INPUT</button>
        <button id="nav-wip" class="bg-slate-700 text-white px-4 py-2 rounded-lg font-bold text-[10px]">WIP</button>
        <button id="nav-stok" class="bg-slate-700 text-white px-4 py-2 rounded-lg font-bold text-[10px]">STOK</button>
    </nav>

    <div id="master" class="page active bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="font-bold text-slate-700 mb-4">Kelola Master Item</h2>
        <input id="m_input" class="w-full p-3 border border-slate-200 rounded-lg mb-4" placeholder="Nama Item Baru">
        <button id="btn-simpan-master" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">SIMPAN DATA</button>
    </div>

    <div id="input" class="page bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="font-bold text-slate-700 mb-4">Input Produksi</h2>
        <input id="p_item" class="w-full p-3 border border-slate-200 rounded-lg mb-2" placeholder="Nama Item">
        <input id="p_qty" type="number" class="w-full p-3 border border-slate-200 rounded-lg mb-4" placeholder="Jumlah">
        <button id="btn-simpan-produksi" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">MULAI PRODUKSI</button>
    </div>

    <div id="stok" class="page bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-sm text-left">
            <thead class="bg-slate-100 text-slate-600 font-bold uppercase">
                <tr>
                    <th class="p-4">Item</th>
                    <th class="p-4">Status</th>
                </tr>
            </thead>
            <tbody id="tabel-body" class="divide-y divide-slate-100">
                </tbody>
        </table>
    </div>

    <script>
        // Inisialisasi
        const supabase = supabase.createClient('https://gbohivcpptvejvkehzun.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdib2hpdmNwcHR2ZWp2a2VoenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTkxNjAsImV4cCI6MjA5NTczNTE2MH0.bB1V04AMzJ4PT77gP7-wan0O84_SjtExvCBfmw60zDE');

        // Navigasi
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stok') loadStok();
        }

        document.getElementById('nav-master').onclick = () => showPage('master');
        document.getElementById('nav-input').onclick = () => showPage('input');
        document.getElementById('nav-stok').onclick = () => showPage('stok');

        // Logic Database
        document.getElementById('btn-simpan-master').onclick = async () => {
            const val = document.getElementById('m_input').value;
            const { error } = await supabase.from('items').insert([{ nama_item: val }]);
            alert(error ? error.message : "Master tersimpan!");
        };

        async function loadStok() {
            const { data } = await supabase.from('items').select('*');
            const tbody = document.getElementById('tabel-body');
            tbody.innerHTML = '';
            data?.forEach(item => {
                tbody.innerHTML += `<tr><td class="p-4">${item.nama_item}</td><td class="p-4 text-green-600 font-bold">Ready</td></tr>`;
            });
        }
    </script>
</body>
</html>
